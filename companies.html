<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PlaceMate | Companies</title>

    <link rel="stylesheet"
          href="css/companies.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- =========================
     Navbar
========================= -->

<header class="navbar">

    <div class="logo">

        <i class="fa-solid fa-graduation-cap"></i>

        <span>PlaceMate</span>

    </div>

    <div class="nav-links">

        <a href="dashboard.html">Dashboard</a>

        <a href="companies.html" class="active">Companies</a>

        <a href="applications.html">Applications</a>

        <a href="profile.html">Profile</a>

    </div>

</header>

<!-- =========================
     Search Section
========================= -->

<section class="search-section">

    <h1>Placement Opportunities</h1>

    <p>
        Discover top companies hiring students.
    </p>

    <div class="search-box">

        <i class="fa-solid fa-search"></i>

        <input
            type="text"
            id="searchInput"
            placeholder="Search Company, Role or Skill">

    </div>

</section>

<!-- =========================
     Filters
========================= -->

<section class="filters">

    <select id="locationFilter">

        <option value="">All Locations</option>

        <option>Bangalore</option>

        <option>Hyderabad</option>

        <option>Noida</option>

        <option>Pune</option>

        <option>Gurgaon</option>

        <option>Mumbai</option>

        <option>Chennai</option>

    </select>

    <select id="packageFilter">

        <option value="">Any Package</option>

        <option>5</option>

        <option>10</option>

        <option>20</option>

        <option>30</option>

    </select>

    <select id="roleFilter">

        <option value="">All Roles</option>

        <option>Software Engineer</option>

        <option>Frontend Developer</option>

        <option>SDE-1</option>

        <option>Graduate Trainee</option>

        <option>System Engineer</option>

        <option>Associate Software Engineer</option>

        <option>Application Developer</option>

    </select>

</section>

<!-- =========================
     Company Cards
========================= -->

<section
    id="companyContainer"
    class="company-grid">

</section>

<!-- =========================
     Details Modal
========================= -->

<div id="modal" class="modal">

    <div class="modal-content">

        <span
            class="close-modal">

            &times;

        </span>

        <div id="modalBody"></div>

    </div>

</div>

<!-- =========================
     Toast
========================= -->

<div id="toast"></div>

<!-- =========================
     Scripts
========================= -->

<script src="js/storage.js"></script>

<script src="js/companies.js"></script>

<script src="js/company-page.js"></script>

</body>

</html>
