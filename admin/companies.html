<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PlaceMate | Company Management</title>

<link rel="stylesheet"
href="../css/admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">

<i class="fa-solid fa-user-shield"></i>

<span>PlaceMate</span>

</div>

<ul>

<li>

<a href="admin-dashboard.html">

<i class="fa-solid fa-chart-line"></i>

<span>Dashboard</span>

</a>

</li>

<li>

<a href="students.html">

<i class="fa-solid fa-user-graduate"></i>

<span>Students</span>

</a>

</li>

<li class="active">

<a href="companies.html">

<i class="fa-solid fa-building"></i>

<span>Companies</span>

</a>

</li>

<li>

<a href="applications.html">

<i class="fa-solid fa-file-lines"></i>

<span>Applications</span>

</a>

</li>

<li>

<a href="#"
onclick="adminLogout()">

<i class="fa-solid fa-right-from-bracket"></i>

<span>Logout</span>

</a>

</li>

</ul>

</aside>

<!-- Main -->

<main class="main">

<header class="topbar">

<h1>Company Management</h1>

<button id="addCompanyBtn" class="primary-btn">

<i class="fa-solid fa-plus"></i>

Add Company

</button>

</header>

<!-- Search -->

<div class="table-toolbar">

<input
type="text"
id="searchCompany"
placeholder="Search company...">

</div>

<!-- Table -->

<div class="table-card">

<table>

<thead>

<tr>

<th>Logo</th>

<th>Name</th>

<th>Role</th>

<th>Package</th>

<th>Location</th>

<th>Deadline</th>

<th>Openings</th>

<th>Actions</th>

</tr>

</thead>

<tbody id="companyTable">

</tbody>

</table>

</div>

</main>

<!-- Company Modal -->

<div id="companyModal" class="modal">

<div class="modal-content">

<span class="close-modal">

&times;

</span>

<h2 id="modalTitle">

Add Company

</h2>

<form id="companyForm">

<input
type="hidden"
id="companyId">

<div class="input-group">

<label>Company Name</label>

<input
type="text"
id="companyName"
required>

</div>

<div class="input-group">

<label>Logo URL</label>

<input
type="text"
id="companyLogo">

</div>

<div class="input-group">

<label>Role</label>

<input
type="text"
id="companyRole">

</div>

<div class="input-group">

<label>Package</label>

<input
type="text"
id="companyPackage">

</div>

<div class="input-group">

<label>Location</label>

<input
type="text"
id="companyLocation">

</div>

<div class="input-group">

<label>Eligibility</label>

<input
type="text"
id="companyEligibility">

</div>

<div class="input-group">

<label>Deadline</label>

<input
type="date"
id="companyDeadline">

</div>

<div class="input-group">

<label>Openings</label>

<input
type="number"
id="companyOpenings">

</div>

<div class="input-group">

<label>Skills (Comma Separated)</label>

<input
type="text"
id="companySkills">

</div>

<button class="primary-btn">

Save Company

</button>

</form>

</div>

</div>

<div id="toast"></div>

<script src="../js/storage.js"></script>
<script src="../js/companies.js"></script>
<script src="../js/admin-companies.js"></script>

</body>

</html>
