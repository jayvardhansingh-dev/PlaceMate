<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>PlaceMate | Register</title>

    <link rel="stylesheet" href="css/register.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="register-container">

    <!-- Left -->

    <div class="left-panel">

        <div class="overlay">

            <h1>Join PlaceMate</h1>

            <p>

                Create your student account and start your placement journey.

            </p>

        </div>

    </div>

    <!-- Right -->

    <div class="right-panel">

        <form id="registerForm">

            <h2>Create Account</h2>

            <p>Fill your details</p>

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                    type="text"
                    id="name"
                    placeholder="Full Name"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-phone"></i>

                <input
                    type="text"
                    id="phone"
                    placeholder="Phone Number"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-building-columns"></i>

                <input
                    type="text"
                    id="college"
                    placeholder="College"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-code-branch"></i>

                <input
                    type="text"
                    id="branch"
                    placeholder="Branch"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required>

            </div>

            <button
                class="register-btn"
                type="submit">

                <i class="fa-solid fa-user-plus"></i>

                Register

            </button>

            <div class="login-link">

                Already have an account?

                <a href="login.html">

                    Login

                </a>

            </div>

        </form>

    </div>

</div>

<div id="toast"></div>

<script src="js/storage.js"></script>

<script src="js/register.js"></script>

</body>

</html>
