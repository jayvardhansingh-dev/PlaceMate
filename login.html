<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlaceMate | Student Login</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <div class="login-page">

        <div class="login-box">

            <div class="login-header">
                <i class="fa-solid fa-user-graduate login-icon"></i>

                <h1>PlaceMate</h1>

                <p>Placement Management System</p>
            </div>

            <form id="loginForm">

                <div class="input-box">
                    <input
                        type="text"
                        id="rollNo"
                        placeholder="Enter Roll Number"
                        required>
                </div>

                <div class="input-box password-box">

                    <input
                        type="password"
                        id="password"
                        placeholder="Enter Password"
                        required>

                    <i class="fa-solid fa-eye" id="togglePassword"></i>

                </div>

                <div class="remember">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                </div>

                <button type="submit" class="login-btn2">

                    Login

                </button>

            </form>

            <div class="login-links">

                <a href="#">Forgot Password?</a>

                <br><br>

                <a href="index.html">

                    ← Back to Home

                </a>

            </div>

        </div>

    </div>

    <script src="login.js"></script>

</body>

</html>
