<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>PlaceMate | My Applications</title>

    <link rel="stylesheet"
          href="css/applications.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- ===========================
     Navbar
=========================== -->

<header class="navbar">

    <div class="logo">

        <i class="fa-solid fa-graduation-cap"></i>

        <span>PlaceMate</span>

    </div>

    <nav>

        <a href="dashboard.html">Dashboard</a>

        <a href="companies.html">Companies</a>

        <a href="applications.html" class="active">Applications</a>

        <a href="profile.html">Profile</a>

    </nav>

</header>

<!-- ===========================
     Hero
=========================== -->

<section class="hero">

    <h1>My Applications</h1>

    <p>Track all your placement applications in one place.</p>

</section>

<!-- ===========================
     Statistics
=========================== -->

<section class="stats">

    <div class="stat-card">

        <h2 id="totalApplications">0</h2>

        <span>Total Applied</span>

    </div>

    <div class="stat-card">

        <h2 id="shortlistedCount">0</h2>

        <span>Shortlisted</span>

    </div>

    <div class="stat-card">

        <h2 id="interviewCount">0</h2>

        <span>Interview</span>

    </div>

    <div class="stat-card">

        <h2 id="selectedCount">0</h2>

        <span>Selected</span>

    </div>

</section>

<!-- ===========================
     Filter
=========================== -->

<section class="filter-section">

    <select id="statusFilter">

        <option value="">All Status</option>

        <option>Applied</option>

        <option>Shortlisted</option>

        <option>Interview</option>

        <option>Selected</option>

        <option>Rejected</option>

    </select>

</section>

<!-- ===========================
     Applications List
=========================== -->

<section
        id="applicationsContainer"
        class="applications-grid">

</section>

<!-- ===========================
     Empty State
=========================== -->

<div
    id="emptyState"
    class="empty-state">

    <i class="fa-solid fa-folder-open"></i>

    <h2>No Applications Yet</h2>

    <p>

        Apply to companies from the Companies page.

    </p>

    <a href="companies.html">

        Browse Companies

    </a>

</div>

<!-- ===========================
     Toast
=========================== -->

<div id="toast"></div>

<script src="js/storage.js"></script>

<script src="js/companies.js"></script>
<script src="js/applications.js"></script>

</body>

</html>
